<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Catch the Stars!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    width: 100%; height: 100%;
    cursor: none;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Audio ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playChime(freq) {
  const t = audioCtx.currentTime;
  [freq, freq * 1.25, freq * 1.5].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.06);
    g.gain.linearRampToValueAtTime(0.15, t + i * 0.06 + 0.02);
    g.gain.linearRampToValueAtTime(0, t + i * 0.06 + 0.25);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.25);
  });
}

function playMiss() {
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(300, t);
  o.frequency.linearRampToValueAtTime(150, t + 0.2);
  g.gain.setValueAtTime(0.08, t);
  g.gain.linearRampToValueAtTime(0, t + 0.2);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + 0.2);
}

function playLevelUp() {
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.1);
    g.gain.linearRampToValueAtTime(0.18, t + i * 0.1 + 0.03);
    g.gain.linearRampToValueAtTime(0, t + i * 0.1 + 0.35);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.35);
  });
}

// --- Input ---
let inputX = -1;
let useTouch = false;

canvas.addEventListener('mousemove', e => { if (!useTouch) inputX = e.clientX; });
canvas.addEventListener('touchstart', e => {
  useTouch = true;
  inputX = e.touches[0].clientX;
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  inputX = e.touches[0].clientX;
}, { passive: true });
canvas.addEventListener('mousedown', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
});

// --- Falling items ---
const STAR_TYPES = [
  { shape: 'star',     color: '#FFD700', glow: '#FFF8A0', points: 1, freq: 700 },
  { shape: 'star',     color: '#FF69B4', glow: '#FFB0D8', points: 1, freq: 800 },
  { shape: 'star',     color: '#87CEEB', glow: '#C0E8FF', points: 1, freq: 600 },
  { shape: 'star',     color: '#98FB98', glow: '#C8FFC8', points: 1, freq: 650 },
  { shape: 'star',     color: '#DDA0DD', glow: '#F0D0F0', points: 1, freq: 750 },
  { shape: 'bigstar',  color: '#FFD700', glow: '#FFFFC0', points: 3, freq: 900 },
  { shape: 'heart',    color: '#FF4466', glow: '#FF8899', points: 2, freq: 850 },
  { shape: 'moon',     color: '#FFFACD', glow: '#FFFFF0', points: 2, freq: 550 },
  { shape: 'diamond',  color: '#00CED1', glow: '#80F0F0', points: 2, freq: 950 },
];

// Bad items to avoid (they reduce lives)
const BAD_TYPES = [
  { shape: 'rock', color: '#666', points: 0 },
];

// --- Game state ---
let basket = { x: 0, width: 100, height: 70 };
let items = [];
let particles = [];
let bgStars = [];
let score = 0;
let lives = 5;
let level = 1;
let nextLevelScore = 10;
let spawnTimer = 0;
let gameOver = false;
let gameOverTimer = 0;
let comboCount = 0;
let comboTimer = 0;
let levelUpTimer = 0;
let shakeMag = 0;

// Background stars
for (let i = 0; i < 80; i++) {
  bgStars.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    r: 0.5 + Math.random() * 2,
    twinkle: Math.random() * Math.PI * 2,
    speed: 0.01 + Math.random() * 0.03,
  });
}

class FallingItem {
  constructor() {
    // Decide if bad (10% chance, increases with level)
    const badChance = Math.min(0.25, 0.05 + level * 0.02);
    this.bad = Math.random() < badChance;

    if (this.bad) {
      this.type = BAD_TYPES[0];
      this.size = 18 + Math.random() * 10;
    } else {
      // Higher level = more special items
      const pool = level >= 3 ? STAR_TYPES : STAR_TYPES.slice(0, 5);
      this.type = pool[Math.floor(Math.random() * pool.length)];
      this.size = this.type.shape === 'bigstar' ? 28 + Math.random() * 8 : 16 + Math.random() * 10;
    }

    this.x = 30 + Math.random() * (W - 60);
    this.y = -this.size;
    this.speed = 1.5 + Math.random() * 1.5 + level * 0.3;
    this.wobbleAmp = 0.3 + Math.random() * 0.8;
    this.wobbleSpeed = 0.02 + Math.random() * 0.02;
    this.wobbleOff = Math.random() * Math.PI * 2;
    this.time = 0;
    this.rotation = 0;
    this.rotSpeed = (Math.random() - 0.5) * 0.04;
    this.alive = true;
    this.opacity = 1;
  }

  update() {
    this.time++;
    this.y += this.speed;
    this.x += Math.sin(this.time * this.wobbleSpeed + this.wobbleOff) * this.wobbleAmp;
    this.rotation += this.rotSpeed;

    // Off screen bottom
    if (this.y > H + 40) {
      this.alive = false;
      if (!this.bad) {
        lives--;
        comboCount = 0;
        shakeMag = 8;
        playMiss();
        if (lives <= 0) {
          gameOver = true;
          gameOverTimer = 0;
        }
      }
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = this.opacity;

    if (this.bad) {
      drawRock(this.size);
    } else {
      // Glow
      ctx.shadowColor = this.type.glow;
      ctx.shadowBlur = 15;
      switch(this.type.shape) {
        case 'star': drawStar5(this.size, this.type.color); break;
        case 'bigstar': drawStar5(this.size, this.type.color); break;
        case 'heart': drawHeart(this.size, this.type.color); break;
        case 'moon': drawMoon(this.size, this.type.color); break;
        case 'diamond': drawDiamond(this.size, this.type.color); break;
      }
    }
    ctx.restore();
  }
}

// --- Shape drawing functions ---
function drawStar5(r, color) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](Math.cos(angle) * r, Math.sin(angle) * r);
    const innerAngle = angle + 2 * Math.PI / 5;
    ctx.lineTo(Math.cos(innerAngle) * r * 0.4, Math.sin(innerAngle) * r * 0.4);
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  // Inner highlight
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](Math.cos(angle) * r * 0.5, Math.sin(angle) * r * 0.5);
    const innerAngle = angle + 2 * Math.PI / 5;
    ctx.lineTo(Math.cos(innerAngle) * r * 0.2, Math.sin(innerAngle) * r * 0.2);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();
}

function drawHeart(r, color) {
  ctx.beginPath();
  ctx.moveTo(0, r * 0.4);
  ctx.bezierCurveTo(-r, -r * 0.3, -r * 0.3, -r, 0, -r * 0.4);
  ctx.bezierCurveTo(r * 0.3, -r, r, -r * 0.3, 0, r * 0.4);
  ctx.fillStyle = color;
  ctx.fill();
  // Shine
  ctx.beginPath();
  ctx.arc(-r * 0.25, -r * 0.25, r * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fill();
}

function drawMoon(r, color) {
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  // Cut out inner circle to make crescent
  ctx.beginPath();
  ctx.arc(r * 0.35, -r * 0.15, r * 0.7, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,30,0.85)';
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  // Re-draw outline
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawDiamond(r, color) {
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.lineTo(r * 0.6, 0);
  ctx.lineTo(0, r);
  ctx.lineTo(-r * 0.6, 0);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  // Facet
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.lineTo(r * 0.2, -r * 0.1);
  ctx.lineTo(0, r);
  ctx.lineTo(-r * 0.15, 0);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fill();
}

function drawRock(r) {
  ctx.beginPath();
  // Irregular rock shape
  const pts = 7;
  for (let i = 0; i < pts; i++) {
    const angle = (i / pts) * Math.PI * 2;
    const dist = r * (0.7 + Math.sin(i * 2.7) * 0.3);
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](Math.cos(angle) * dist, Math.sin(angle) * dist);
  }
  ctx.closePath();
  ctx.fillStyle = '#555';
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Crack line
  ctx.beginPath();
  ctx.moveTo(-r * 0.3, -r * 0.2);
  ctx.lineTo(0, r * 0.1);
  ctx.lineTo(r * 0.2, -r * 0.1);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// --- Basket / Character: a cute bunny ---
function drawBunny(x, y, w) {
  const s = w / 100; // scale factor
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);

  // Basket (the body acts as a basket)
  // Body
  ctx.beginPath();
  ctx.ellipse(0, 10, 40, 35, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#f5e0d0';
  ctx.fill();
  ctx.strokeStyle = '#d0b8a0';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Belly
  ctx.beginPath();
  ctx.ellipse(0, 18, 28, 22, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#fff8f0';
  ctx.fill();

  // Left ear
  ctx.beginPath();
  ctx.ellipse(-18, -50, 12, 30, -0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#f5e0d0';
  ctx.fill();
  ctx.strokeStyle = '#d0b8a0';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Inner ear
  ctx.beginPath();
  ctx.ellipse(-18, -48, 7, 22, -0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#ffb8c8';
  ctx.fill();

  // Right ear
  ctx.beginPath();
  ctx.ellipse(18, -50, 12, 30, 0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#f5e0d0';
  ctx.fill();
  ctx.strokeStyle = '#d0b8a0';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Inner ear
  ctx.beginPath();
  ctx.ellipse(18, -48, 7, 22, 0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#ffb8c8';
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.ellipse(0, -20, 30, 25, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#f5e0d0';
  ctx.fill();
  ctx.strokeStyle = '#d0b8a0';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Eyes
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.ellipse(-10, -24, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10, -24, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Eye sparkles
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-11, -26, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(9, -26, 2, 0, Math.PI * 2); ctx.fill();

  // Nose
  ctx.beginPath();
  ctx.moveTo(0, -16);
  ctx.lineTo(-3, -13);
  ctx.lineTo(3, -13);
  ctx.closePath();
  ctx.fillStyle = '#ff8888';
  ctx.fill();

  // Mouth
  ctx.beginPath();
  ctx.arc(-3, -11, 4, 0, 0.8 * Math.PI);
  ctx.strokeStyle = '#c09080';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(3, -11, 4, 0.2 * Math.PI, Math.PI);
  ctx.stroke();

  // Blush
  ctx.fillStyle = 'rgba(255,150,150,0.3)';
  ctx.beginPath(); ctx.ellipse(-22, -16, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(22, -16, 7, 4, 0, 0, Math.PI * 2); ctx.fill();

  // Arms (holding up like catching)
  ctx.strokeStyle = '#f5e0d0';
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  // Left arm
  ctx.beginPath();
  ctx.moveTo(-35, 0);
  ctx.quadraticCurveTo(-50, -15, -42, -30);
  ctx.stroke();
  ctx.strokeStyle = '#d0b8a0'; ctx.lineWidth = 2;
  ctx.stroke();
  // Right arm
  ctx.strokeStyle = '#f5e0d0'; ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.moveTo(35, 0);
  ctx.quadraticCurveTo(50, -15, 42, -30);
  ctx.stroke();
  ctx.strokeStyle = '#d0b8a0'; ctx.lineWidth = 2;
  ctx.stroke();

  // Paws at end of arms
  ctx.fillStyle = '#f5e0d0';
  ctx.beginPath(); ctx.arc(-42, -30, 8, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#d0b8a0'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(42, -30, 8, 0, Math.PI * 2); ctx.fill();
  ctx.stroke();

  // Feet
  ctx.fillStyle = '#f5e0d0';
  ctx.beginPath(); ctx.ellipse(-18, 42, 14, 8, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#d0b8a0'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(18, 42, 14, 8, 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.stroke();

  ctx.restore();
}

// --- Catch zone: area between the paws ---
function getCatchZone() {
  const s = basket.width / 100;
  return {
    x: basket.x,
    y: H - 60,
    halfW: 42 * s,
    top: -35 * s,
    bottom: 5 * s,
  };
}

// --- Particles ---
class Particle {
  constructor(x, y, color, type) {
    this.x = x;
    this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = type === 'catch' ? 2 + Math.random() * 6 : 1 + Math.random() * 3;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - (type === 'catch' ? 3 : 1);
    this.r = type === 'catch' ? 2 + Math.random() * 4 : 1.5 + Math.random() * 2;
    this.color = color;
    this.life = 1;
    this.decay = 0.015 + Math.random() * 0.02;
    this.type = type; // 'catch', 'miss', 'trail'
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.1;
    this.life -= this.decay;
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.life;
    if (this.type === 'catch') {
      // Star-shaped particle
      ctx.translate(this.x, this.y);
      ctx.rotate(this.life * 3);
      drawStar5(this.r * this.life, this.color);
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
    ctx.restore();
  }
}

// --- Floating score text ---
let floatingTexts = [];
class FloatingText {
  constructor(x, y, text, color) {
    this.x = x;
    this.y = y;
    this.text = text;
    this.color = color;
    this.life = 1;
    this.vy = -2;
  }
  update() {
    this.y += this.vy;
    this.vy *= 0.97;
    this.life -= 0.018;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.font = `bold ${24 + (1 - this.life) * 10}px 'Comic Sans MS', cursive`;
    ctx.textAlign = 'center';
    ctx.fillStyle = this.color;
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 4;
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

// --- Background ---
function drawBackground() {
  // Night sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a2e');
  grad.addColorStop(0.4, '#1a1a4e');
  grad.addColorStop(0.7, '#2a1a4e');
  grad.addColorStop(1, '#1a3050');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Background stars
  for (const s of bgStars) {
    s.twinkle += s.speed;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
    ctx.beginPath();
    ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,240,${alpha})`;
    ctx.fill();
  }

  // Ground / grass
  ctx.fillStyle = '#1a4a20';
  ctx.fillRect(0, H - 20, W, 20);
  // Grass tufts
  ctx.fillStyle = '#2a6a30';
  for (let x = 0; x < W; x += 12) {
    ctx.beginPath();
    ctx.moveTo(x, H - 20);
    ctx.lineTo(x + 4, H - 26 - Math.sin(x * 0.3) * 4);
    ctx.lineTo(x + 8, H - 20);
    ctx.fill();
  }
}

// --- HUD ---
function drawHUD() {
  ctx.save();

  // Score
  ctx.font = "bold 32px 'Comic Sans MS', cursive";
  ctx.textAlign = 'left';
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 6;
  ctx.fillText('\u{2B50} ' + score, 20, 40);

  // Level
  ctx.font = "bold 22px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#87CEEB';
  ctx.fillText('Level ' + level, 20, 70);

  // Lives (hearts)
  ctx.font = '28px serif';
  ctx.textAlign = 'right';
  let livesStr = '';
  for (let i = 0; i < 5; i++) {
    livesStr += i < lives ? '\u{2764}\uFE0F' : '\u{1F5A4}';
  }
  ctx.fillText(livesStr, W - 20, 40);

  // Combo
  if (comboCount >= 3 && comboTimer > 0) {
    ctx.textAlign = 'center';
    ctx.font = `bold ${28 + comboCount}px 'Comic Sans MS', cursive`;
    ctx.fillStyle = `hsl(${comboCount * 30}, 100%, 70%)`;
    ctx.globalAlpha = Math.min(1, comboTimer / 30);
    ctx.fillText(`${comboCount}x Combo!`, W / 2, 50);
  }

  // Level up flash
  if (levelUpTimer > 0) {
    ctx.textAlign = 'center';
    ctx.font = "bold 48px 'Comic Sans MS', cursive";
    ctx.globalAlpha = Math.min(1, levelUpTimer / 30);
    const hue = (120 - levelUpTimer * 3) % 360;
    ctx.fillStyle = `hsl(${hue}, 90%, 65%)`;
    ctx.fillText(`Level ${level}!`, W / 2, H / 3);
    ctx.font = "24px 'Comic Sans MS', cursive";
    ctx.fillStyle = '#fff';
    ctx.fillText('Faster and more items!', W / 2, H / 3 + 40);
  }

  ctx.restore();
}

function drawGameOver() {
  gameOverTimer++;
  const alpha = Math.min(1, gameOverTimer / 60);

  ctx.save();
  ctx.globalAlpha = alpha * 0.7;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = alpha;

  ctx.textAlign = 'center';
  ctx.font = "bold 56px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.fillText('Great Job!', W / 2, H / 2 - 40);

  ctx.font = "bold 36px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#fff';
  ctx.fillText(`You caught ${score} stars!`, W / 2, H / 2 + 20);

  ctx.font = "26px 'Comic Sans MS', cursive";
  ctx.fillStyle = '#87CEEB';
  ctx.fillText('Tap to play again!', W / 2, H / 2 + 70);

  ctx.restore();
}

// --- Restart ---
function restart() {
  score = 0;
  lives = 5;
  level = 1;
  nextLevelScore = 10;
  items = [];
  particles = [];
  floatingTexts = [];
  comboCount = 0;
  comboTimer = 0;
  levelUpTimer = 0;
  shakeMag = 0;
  gameOver = false;
  gameOverTimer = 0;
}

canvas.addEventListener('click', () => {
  if (gameOver && gameOverTimer > 60) restart();
});

// --- Main loop ---
function update() {
  if (gameOver) return;

  // Move basket toward input
  if (inputX < 0) inputX = W / 2;
  const targetX = inputX;
  basket.x += (targetX - basket.x) * 0.25;
  basket.width = Math.min(120, W * 0.2);

  // Spawn items
  spawnTimer++;
  const spawnRate = Math.max(15, 45 - level * 4);
  if (spawnTimer >= spawnRate) {
    spawnTimer = 0;
    items.push(new FallingItem());
  }

  // Update items
  for (const item of items) {
    item.update();

    if (!item.alive) continue;

    // Check catch
    const cz = getCatchZone();
    const dx = item.x - cz.x;
    const dy = item.y - (cz.y + (cz.top + cz.bottom) / 2);
    if (Math.abs(dx) < cz.halfW + item.size * 0.5 &&
        dy > cz.top - item.size && dy < cz.bottom + item.size) {

      item.alive = false;

      if (item.bad) {
        // Hit by rock
        lives--;
        shakeMag = 12;
        comboCount = 0;
        playMiss();
        for (let i = 0; i < 8; i++) particles.push(new Particle(item.x, item.y, '#888', 'miss'));
        floatingTexts.push(new FloatingText(item.x, item.y, 'Ouch!', '#ff6666'));
        if (lives <= 0) { gameOver = true; gameOverTimer = 0; }
      } else {
        // Caught a star
        const pts = item.type.points;
        score += pts;
        comboCount++;
        comboTimer = 90;
        playChime(item.type.freq);

        // Particles
        const count = 10 + pts * 5;
        for (let i = 0; i < count; i++) {
          particles.push(new Particle(item.x, item.y, item.type.glow, 'catch'));
        }

        // Floating text
        let txt = '+' + pts;
        if (comboCount >= 3) txt += ' x' + comboCount;
        floatingTexts.push(new FloatingText(item.x, item.y - 20, txt, item.type.color));

        // Level up check
        if (score >= nextLevelScore) {
          level++;
          nextLevelScore += 10 + level * 5;
          levelUpTimer = 90;
          playLevelUp();
        }
      }
    }
  }

  items = items.filter(i => i.alive);

  // Star trails
  for (const item of items) {
    if (!item.bad && Math.random() < 0.3) {
      particles.push(new Particle(
        item.x + (Math.random() - 0.5) * item.size,
        item.y + item.size * 0.3,
        item.type.glow, 'trail'
      ));
    }
  }

  // Update particles
  particles.forEach(p => p.update());
  particles = particles.filter(p => p.life > 0);

  // Update floating texts
  floatingTexts.forEach(f => f.update());
  floatingTexts = floatingTexts.filter(f => f.life > 0);

  // Timers
  if (comboTimer > 0) comboTimer--;
  if (comboTimer <= 0) comboCount = 0;
  if (levelUpTimer > 0) levelUpTimer--;
  if (shakeMag > 0) shakeMag *= 0.85;
}

function draw() {
  ctx.save();

  // Screen shake
  if (shakeMag > 0.5) {
    ctx.translate(
      (Math.random() - 0.5) * shakeMag,
      (Math.random() - 0.5) * shakeMag
    );
  }

  drawBackground();

  // Draw particles (behind items)
  particles.filter(p => p.type === 'trail').forEach(p => p.draw());

  // Draw falling items
  items.forEach(i => i.draw());

  // Draw catch particles (in front)
  particles.filter(p => p.type !== 'trail').forEach(p => p.draw());

  // Draw bunny
  drawBunny(basket.x, H - 60, basket.width);

  // Floating texts
  floatingTexts.forEach(f => f.draw());

  ctx.restore();

  drawHUD();

  if (gameOver) drawGameOver();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
